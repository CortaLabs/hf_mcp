# hf-mcp capability exposure configuration
#
# Presets:
# - reader: read-oriented exposure
# - forum_operator: read + core content/bytes write exposure
# - full_api: broadest shipped exposure preset (explicit opt-in)
# - custom: start empty and explicitly opt in
#
# IMPORTANT:
# Presets are exposure control for a user/deployment. They do not reduce product
# scope. docs/coverage_matrix.md contains both:
# - concrete shipped helpers (usable now), including core reads plus
#   `bytes.read`, `contracts.read`, `disputes.read`, `bratings.read`,
#   `sigmarket.market.read`, `sigmarket.order.read`, and `admin.high_risk.read`
# - registry placeholder rows retained for documented API coverage tracking:
#   `contracts.write`, `sigmarket.write`, `admin.high_risk.write`
#   (not promises of live-ready helper behavior)

profile: reader

# Optional explicit overlays for any profile.
# These keep naming human-readable and fail closed on unknown values.
# enabled_capabilities: []
# enabled_parameter_families: []
# disabled_capabilities: []
# disabled_parameter_families: []

# Optional runtime path override. Must be absolute and outside this repository.
# token_path: /home/you/.config/hf_mcp/token.json

# OAuth redirect variables are machine-local env inputs, not YAML policy keys.
# Put these in .env or your shell:
# - HF_MCP_EXTERNAL_REDIRECT_URI=https://cortalabs.github.io/hf_mcp/oauth_callback.html
#   Hosted callback artifact path: docs/oauth_callback.html
#   Hosted page forwards to fixed local callback target: http://127.0.0.1:8765/callback
# - Legacy fallback (loopback-only): HF_MCP_REDIRECT_URI=http://127.0.0.1:8765/callback

# Capabilities currently exposed by profile = "full_api":
# me.read, users.read, forums.read, threads.read, posts.read, bytes.read,
# contracts.read, disputes.read, bratings.read, sigmarket.market.read,
# sigmarket.order.read, threads.create, posts.reply, bytes.transfer,
# bytes.deposit, bytes.withdraw, bytes.bump, contracts.write,
# sigmarket.write, admin.high_risk.read, admin.high_risk.write
#
# Browse anchor expectations:
# - threads.read => fid required; tid optional narrowing selector
# - posts.read => tid required; pid optional narrowing selector
#
# Output contract:
# - MCP tools return JSON-first dict payloads today
# - readable output (if introduced later) must be additive only
#
# Live test boundary:
# - no automated live writes
# - manual live checks only on TID 6083735 or FID 375
# - ideally one testing thread total

# Parameter families currently exposed by profile = "full_api":
# selectors.user, selectors.forum, selectors.thread, selectors.post,
# selectors.bytes, selectors.contract, selectors.dispute, selectors.sigmarket,
# filters.pagination, fields.me.basic, fields.me.advanced,
# fields.users.profile, fields.posts.body, fields.bytes.amount,
# writes.content, writes.bytes, confirm.live
